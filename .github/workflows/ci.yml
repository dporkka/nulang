name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y python3-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --all-targets

      - name: Test
        run: cargo test

  minimal-build:
    name: Build without optional features
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      # No python3-dev installed here on purpose: this job proves the
      # no-default-features build has zero PyO3/SQLite/LSP dependencies.
      - name: Build
        run: cargo build --all-targets --no-default-features

      - name: Test
        run: cargo test --no-default-features

  lint:
    name: Format & Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y python3-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      # The codebase has not been rustfmt'd yet; the format check runs
      # non-blocking so CI reports drift without failing the build. Flip to
      # blocking once the existing findings are addressed.
      - name: Format check
        run: cargo fmt --check
        continue-on-error: true

      # Clippy is blocking: deny-level errors have been fixed. Warnings are
      # still reported but do not fail the build.
      - name: Clippy
        run: cargo clippy --all-targets
