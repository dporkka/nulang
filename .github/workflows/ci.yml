name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y python3-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --all-targets

      - name: Test
        run: cargo test

      - name: Gate (forbidden patterns)
        run: python3 verify_implementation.py

  minimal-build:
    name: Build without optional features
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      # No python3-dev installed here on purpose: this job proves the
      # no-default-features build has zero PyO3/SQLite/LSP dependencies.
      - name: Build
        run: cargo build --all-targets --no-default-features

      - name: Test
        run: cargo test --no-default-features

  wasm-backend:
    name: Build & Test (wasm-backend feature)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y python3-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --all-targets --features wasm-backend

      - name: Test
        run: cargo test --features wasm-backend

  lint:
    name: Format & Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y python3-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      # Format check is blocking — the codebase has been rustfmt'd.
      - name: Format check
        run: cargo fmt --check

      # Clippy denies correctness lints; style/perf warnings are
      # non-blocking until the existing findings are addressed.
      - name: Clippy
        run: cargo clippy --all-targets -- -D clippy::correctness

      - name: Audit (cargo-audit)
        run: |
          cargo install cargo-audit --locked
          cargo audit

      - name: Check all features
        run: cargo check --all-features

      - name: Check docs
        run: cargo doc --no-deps
