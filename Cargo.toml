[package]
name = "nulang"
version = "0.1.0"
edition = "2021"
authors = ["Nulang Team"]
description = "Nulang - Distributed Actor-Based Programming Language with AI Agent Support"

[dependencies]
# Memory & concurrency
mimalloc = "0.1"
crossbeam = "0.8"

# Cranelift JIT backend
cranelift = "0.132"
cranelift-jit = "0.132"
cranelift-module = "0.132"
cranelift-native = "0.132"
cranelift-frontend = "0.132"

# LSP server
tower-lsp = "0.22"
tokio = { version = "1", features = ["full"] }

[lib]
name = "nulang"
path = "src/lib.rs"

[[bin]]
name = "nulang"
path = "src/main.rs"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1

[profile.dev]
opt-level = 0
debug = true

[profile.test]
lto = false
codegen-units = 16
