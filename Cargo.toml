[package]
name = "nulang"
version = "0.1.0"
edition = "2021"
authors = ["Nulang Team"]
description = "Nulang - Distributed Actor-Based Programming Language with AI Agent Support"

[dependencies]
mimalloc = "0.1"
crossbeam = "0.8"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1

[profile.dev]
opt-level = 0
debug = true

[profile.test]
lto = false
codegen-units = 16
