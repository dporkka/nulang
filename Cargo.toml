[package]
name = "nulang"
version = "0.13.0-alpha.1"
edition = "2021"
authors = ["David Porkka"]
license = "Apache-2.0"
description = "Nulang - Distributed Actor-Based Programming Language with AI Agent Support"

[dependencies]
# Memory & concurrency
mimalloc = "0.1"
crossbeam = "0.8"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Cranelift JIT backend
cranelift = "0.132"
cranelift-jit = "0.132"
cranelift-module = "0.132"
cranelift-native = "0.132"
cranelift-frontend = "0.132"

# LSP server
tower-lsp = "0.20"
tokio = { version = "1", features = ["full"] }

# HTTP client for AI provider integrations
reqwest = { version = "0.12", features = ["json"] }
async-trait = "0.1"

# Python interop (PyO3)
pyo3 = { version = "0.29", features = ["auto-initialize", "py-clone"] }

# SQLite persistence backend
rusqlite = { version = "0.40", features = ["bundled"] }

# Native library loading
libloading = "0.8"

[lib]
name = "nulang"
crate-type = ["rlib", "cdylib"]
path = "src/lib.rs"

[[bin]]
name = "nulang"
path = "src/main.rs"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1

[profile.dev]
opt-level = 0
debug = true

[profile.test]
lto = false
codegen-units = 16

